name: Bug report
description: Report a reproducible MCDF Manager client problem.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in MCDF Manager. Include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MCDF Manager version
      placeholder: v0.1.0 or release tag
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x86_64
        - macOS Apple Silicon
        - macOS Intel
        - Linux x86_64
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach screenshots or paste relevant logs. Remove private tokens, local secrets, and personal data.
