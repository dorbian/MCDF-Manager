name: Release MCDF Manager client

on:
  push:
    tags:
      - 'client-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release, for example 0.1.23'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as prerelease'
        required: true
        default: false
        type: boolean
      draft:
        description: 'Create the GitHub Release as a draft'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PRODUCT_NAME: MCDF Manager
  PRODUCT_ASSET_PREFIX: MCDF-Manager

concurrency:
  group: client-release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      version: ${{ steps.meta.outputs.version }}
      create_tag: ${{ steps.meta.outputs.create_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Calculate client release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#client-v}"
            CREATE_TAG="false"
            PRERELEASE="false"
            DRAFT="false"
          else
            VERSION="${{ inputs.version }}"
            TAG_NAME="client-v${VERSION}"
            CREATE_TAG="true"
            PRERELEASE="${{ inputs.prerelease }}"
            DRAFT="${{ inputs.draft }}"
          fi

          RELEASE_VERSION="${VERSION}" REQUIRE_PACKAGE_VERSION_MATCH=true REQUIRE_CHANGELOG_VERSION_MATCH=true pnpm run validate:release-version

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=MCDF Manager ${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=${CREATE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "draft=${DRAFT}" >> "${GITHUB_OUTPUT}"

  build-tauri:
    name: Build desktop client (${{ matrix.name }})
    needs: metadata
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x86_64
            artifact_platform: linux-x86_64
            platform: ubuntu-22.04
            args: ''
            target: ''
          - name: Windows-x86_64
            artifact_platform: windows-x86_64
            platform: windows-latest
            args: ''
            target: ''
          - name: macOS-Apple-Silicon
            artifact_platform: macos-aarch64
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - name: macOS-Intel
            artifact_platform: macos-x86_64
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate public product text
        run: pnpm run validate:public-text

      - name: Build frontend
        run: pnpm run build

      - name: Check Rust client backend
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload raw platform bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/${{ matrix.target }}/release/bundle/**

  publish-release:
    name: Publish client release
    needs:
      - metadata
      - build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create release tag for manual release
        if: needs.metadata.outputs.create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.metadata.outputs.tag_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists; keeping it."
          else
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "${TAG_NAME}"
          fi

      - name: Download raw platform bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Package official release assets
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p packaged-assets
          shopt -s nullglob

          for artifact_dir in release-assets/*; do
            [[ -d "${artifact_dir}" ]] || continue
            platform="$(basename "${artifact_dir}")"
            case "${platform}" in
              windows-x86_64) display_platform="Windows-x86_64" ;;
              linux-x86_64) display_platform="Linux-x86_64" ;;
              macos-aarch64) display_platform="macOS-Apple-Silicon" ;;
              macos-x86_64) display_platform="macOS-Intel" ;;
              *) display_platform="${platform}" ;;
            esac
            asset_name="MCDF-Manager-${display_platform}-v${RELEASE_VERSION}.zip"
            echo "Packaging ${platform} as ${asset_name}"
            (cd "${artifact_dir}" && zip -qr "${GITHUB_WORKSPACE}/packaged-assets/${asset_name}" .)
          done

          test -n "$(find packaged-assets -maxdepth 1 -name '*.zip' -print -quit)"
          (cd packaged-assets && sha256sum *.zip > checksums.txt)
          pnpm run release:manifest -- packaged-assets

          echo "Packaged assets:"
          find packaged-assets -maxdepth 1 -type f -print | sort

      - name: Generate release notes
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: pnpm run release:notes -- "${RELEASE_VERSION}"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          DRAFT: ${{ needs.metadata.outputs.draft }}
        run: |
          set -euo pipefail

          release_args=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi
          if [[ "${DRAFT}" == "true" ]]; then
            release_args+=(--draft)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-body.md \
              "${release_args[@]}"
          else
            gh release create "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-body.md \
              "${release_args[@]}"
          fi

      - name: Upload official release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${TAG_NAME}" packaged-assets/* --clobber
